name: CI
permissions:
    contents: read

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
    lint:
        name: Lint, Type Check & Test
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v6
              with:
                  version: 10
            - name: Use Node.js 24.x
              uses: actions/setup-node@v6
              with:
                  node-version: 24.x
                  cache: "pnpm"
            - run: pnpm install --frozen-lockfile
            - run: pnpm run lint
            - run: pnpm run typecheck
            - run: pnpm run format:check
            - run: pnpm test

    build:
        # cacheComponents + reactCompiler surface cache/Suspense placement
        # errors at build time only — lint/typecheck cannot catch them.
        name: Build
        runs-on: ubuntu-latest
        env:
            # Placeholder so the Sanity Studio route can prerender; data
            # fetchers fall back to empty content via isSanityConfigured.
            NEXT_PUBLIC_STORE_SANITY_PROJECT_ID: ci0placeholder

        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v6
              with:
                  version: 10
            - name: Use Node.js 24.x
              uses: actions/setup-node@v6
              with:
                  node-version: 24.x
                  cache: "pnpm"
            - run: pnpm install --frozen-lockfile
            - run: pnpm run build
