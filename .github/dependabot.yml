version: 2
updates:
    - package-ecosystem: "npm"
      directory: "/"
      schedule:
          interval: "weekly"
          day: "monday"
      open-pull-requests-limit: 5
      groups:
          types:
              patterns:
                  - "@types/*"
          sanity:
              patterns:
                  - "sanity"
                  - "@sanity/*"
                  - "next-sanity"
          next:
              patterns:
                  - "next"
                  - "eslint-config-next"
          react:
              patterns:
                  - "react"
                  - "react-dom"
                  - "@types/react"
                  - "@types/react-dom"
          radix:
              patterns:
                  - "@radix-ui/*"
          dev-tooling:
              patterns:
                  - "eslint*"
                  - "prettier"
                  - "typescript"
                  - "husky"
                  - "lint-staged"
                  - "vitest"
                  - "@vitest/*"

    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "weekly"
          day: "monday"
